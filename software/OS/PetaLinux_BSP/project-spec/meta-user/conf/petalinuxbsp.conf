#User Configuration

#OE_TERMINAL = "tmux"

EXTRA_DTFILE_PREFIX = "system"
EXTRA_DTFILES_BUNDLE = "1"
UBOOT_IMAGE_BLOB:k26 = "0"
INITRAMFS_PACKAGES:append = " misc-config"
QEMU_HWDTB_NAME:k26 = "board-zynqmp-k26-starterkit-virt.dtb"
IMAGE_BOOT_FILES:zynqmp = "ramdisk.cpio.gz.u-boot,boot.scr,Image,system.dtb,system-zynqmp-sck-kv-g-revB.dtb"

# ----------------------------------------------------------------------------
# multichannel-openamp-gpio runtime packages
#
# The 22 packages below are required at run time by the multichannel-openamp-gpio
# firmware on the running board (verified against the rpm-installed.txt snapshot
# from latest-project-files/package-snapshot/). They are pulled in here through
# IMAGE_INSTALL:append rather than through CONFIG_*=y in rootfs_config because
# they live in external Yocto layers (meta-vitis-ai, meta-vvas, meta-xilinx-kria,
# meta-xilinx-tools-vitis-ai) that are layered in through bblayers.conf rather
# than exposed as Kconfig entries.
#
# To resolve these recipes, add the corresponding layers to
# components/yocto/conf/bblayers.conf (see PetaLinux_BSP/README.md §"Adding
# the missing recipes" for the layer list).
# ----------------------------------------------------------------------------

IMAGE_INSTALL:append = " \
    vitis-ai-library \
    vart \
    vvas-core \
    vvas-utils \
    vvas-gst \
    vvas-accel-libs \
    packagegroup-petalinux-vvas \
    libjansson4 \
    libvcu-xlnx \
    libomxil-xlnx \
    xlnx-platformstats \
    xlnx-platformstats-python \
    xmutil \
    fpga-manager-util-xilinx \
    fpga-manager-util-base-xilinx \
    kria-dashboard \
    packagegroup-petalinux-openamp-echo-test \
    packagegroup-petalinux-openamp-rpc-demo \
    packagegroup-petalinux-openamp-matrix-mul \
    openamp-demo-notebooks \
    python3-pyserial \
    gstreamer1.0-omx \
    "

